<!DOCTYPE html>
<html lang="vi" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#faf8f5">
  <title>Truyện Nhanh</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
</head>
<body>
  <div id="app">

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="overlay hidden">
      <div class="loading-box">
        <div class="spinner"></div>
        <p id="loading-text">Đang xử lý...</p>
      </div>
    </div>

    <!-- ====== LIBRARY VIEW ====== -->
    <div id="library-view" class="view active">
      <header class="lib-header">
        <h1 class="lib-title">Truyện Nhanh</h1>
      </header>
      <main class="lib-main">
        <div id="empty-state">
          <div class="empty-icon">📖</div>
          <p class="empty-title">Chưa có sách nào</p>
          <p class="empty-hint">Nhấn nút <strong>+</strong> để thêm file PDF</p>
        </div>
        <div id="book-grid"></div>
      </main>
      <button id="add-book-btn" class="fab" aria-label="Thêm sách">+</button>
      <input type="file" id="file-input" accept=".pdf" hidden>
    </div>

    <!-- ====== READER VIEW ====== -->
    <div id="reader-view" class="view">
      <header class="reader-header">
        <button id="back-btn" class="header-btn" aria-label="Quay lại">←</button>
        <span id="reader-title" class="reader-title truncate">Tên sách</span>
        <button id="sidebar-toggle" class="header-btn" aria-label="Mục lục">☰</button>
        <button id="settings-toggle" class="header-btn" aria-label="Cài đặt">⚙</button>
      </header>
      <main id="reader-content" class="reader-content">
        <div id="pages-container"></div>
      </main>
      <footer class="reader-footer">
        <div class="progress-track">
          <div id="progress-fill" class="progress-fill"></div>
        </div>
        <span id="progress-text" class="progress-text">0%</span>
      </footer>
    </div>

    <!-- ====== CHAPTER SIDEBAR ====== -->
    <div id="sidebar" class="drawer hidden">
      <div class="drawer-backdrop" id="sidebar-backdrop"></div>
      <aside class="drawer-panel drawer-left" id="sidebar-panel">
        <header class="drawer-header">
          <h2 class="drawer-title">Mục lục</h2>
          <button id="sidebar-close" class="header-btn" aria-label="Đóng">✕</button>
        </header>
        <nav id="chapter-list" class="chapter-list"></nav>
        <footer class="drawer-footer">
          <span id="read-count">Đã đọc: 0/0</span>
        </footer>
      </aside>
    </div>

    <!-- ====== SETTINGS DRAWER ====== -->
    <div id="settings" class="drawer hidden">
      <div class="drawer-backdrop" id="settings-backdrop"></div>
      <aside class="drawer-panel drawer-right" id="settings-panel">
        <header class="drawer-header">
          <h2 class="drawer-title">Cài đặt</h2>
          <button id="settings-close" class="header-btn" aria-label="Đóng">✕</button>
        </header>
        <div class="settings-body">
          <div class="setting-row">
            <label class="setting-label">Chế độ tối</label>
            <button id="darkmode-toggle" class="toggle-btn">Tắt</button>
          </div>
        </div>
      </aside>
    </div>

  </div>
  <script src="app.js"></script>
</body>
</html>
